<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="voidGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a"/>
  <!-- Anvil Shape -->
  <path d="M40 140 L160 140 L150 110 L120 100 L120 80 L80 80 L80 100 L50 110 Z" fill="#222" stroke="#444" stroke-width="2"/>
  <!-- Void/Black Hole -->
  <circle cx="100" cy="110" r="25" fill="url(#voidGrad)">
    <animate attributeName="r" values="22;28;22" dur="3s" repeatCount="indefinite" />
  </circle>
  <!-- Crystal Spark -->
  <path d="M100 40 L115 70 L100 100 L85 70 Z" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </path>
</svg>
